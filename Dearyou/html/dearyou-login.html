<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dear You - login</title>
  <link rel="stylesheet" href="../css/dearyou-login.css">
</head>
<body>
 <!--헤더 영역-->
 <header class="header">
  <div class="container header_inner">
    <a href="./Dearyou-main.html"><img src="../img/main/logo.png" alt="img"></a>
    
    <!--검색창-->
      <form class="search-form">
        <div class="search-box">
         <input type="search" name="q">
          <button type="submit">
           <img src="../img/main/find.png" alt="icon">
         </button>
        </div>
      </form>  
        
      <!--네비 영역-->
      <div class="topmenu">
        <a href="../html/dearyou-login.html">로그인</a>
        <a href="../html/dearyou-signup.html">회원가입</a>
        <a href="#" id="openDelivery">배송안내</a>
          <div class="delivery-modal">
          <div class="modal-content">
            <h3>배송안내</h3>
            <p>배송기간: 2~3일 소요</p>
            <p>배송비: 3,000원 (3만원 이상 무료)</p>
            <button id="closeDelivery">창닫기</button>
           </div>
         </div>
      </div>
    </div>
       <nav class="submenu">
         <ul class="container">
           <li><a href="../html/dearyou-sub01.html">메뉴안내</a></li>
           <li><a href="../html/dearyou-sub02.html">브랜드스토리</a></li>
         </ul> 
       </nav>
     </header>

    <!--로그인 영역-->
    <div class="login-container">
     <div class="login-box">
       <h2>로그인</h2>
       <form>
         <div class="login-group">
           <label for="username"></label>
           <input type="text" id="username" placeholder="아이디를 입력하세요." maxlength="16">
         </div>
         <div class="login-group">
           <label for="password"></label>
           <input type="password" id="password" placeholder="비밀번호를 입력하세요." maxlength="16">
        </div>
         <div class="login-help">
          <ul>
           <li><a href="#">아이디 찾기</a></li>
           <li>ㅣ</li>
           <li><a href="#">비밀번호 찾기</a></li>
           <li>ㅣ</li>
           <li><a href="../html/signin.html">회원가입</a></li>
         </ul>
         </div>
         <button type="submit" class="login-btn">로그인</button>
        </form>
    </div>
   </div>

    <!--푸터영역-->
    <footer>
       <div class="footer_left">
        <a href="./index.html"><img src="../img/main/logo.png" alt="img"></a>
        <ul>
          <li>상호명: 디어유&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ㅣ&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;대표자 성함: 김나연</li>
          <li>주소: 대구광역시 달서구 장기로127&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ㅣ&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;사업자등록번호 : 000-00-00000</li>
          <li>대표 전화번호 : 010-3662-2435</li>
        </ul>
      </div>

      <div class="footer_right">
      <ul>
        <li><a href="#">이용약관</a></li>
        <li><a href="#">개인정보처리방침</a></li>
      </ul>
      </div>
    </footer>
</body>

<script>
//배송안내(클릭시 팝업창)
const openBtn = document.getElementById('openDelivery');
const modal = document.querySelector('.delivery-modal');
const closeBtn = document.getElementById('closeDelivery');

openBtn.addEventListener('click', () => {
  modal.style.display = 'block';
});

closeBtn.addEventListener('click', () => {
  modal.style.display = 'none';
}); 
</script>
</html>
